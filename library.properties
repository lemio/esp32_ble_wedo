name=Powered Up BLE library for ESP32
version=3.0.0
author=Geert Roumen <info@lemio.nl>
maintainer=Geert Roumen <info@lemio.nl>
sentence=A library to connect and control LEGO WeDo 2.0 and LEGO Powered Up (hubs, train hubs, Remote Control) over BLE.
paragraph=Supports sensors and actuators (motor, sound, led) on WeDo 2.0 hubs, and Powered Up / BOOST / train hubs and Remote Controls over the LWP3 protocol, including connecting to more than one device at the same time. Uses NimBLE-Arduino.
category=Communication
url=https://github.com/lemio/esp32_PoweredUp
architectures=esp32
includes=PoweredUp.h
depends=NimBLE-Arduino
