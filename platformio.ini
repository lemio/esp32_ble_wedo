; PlatformIO project for building every example in this library from the repo root -
; run `pio run` here to compile all of them in one go, no separate test project needed.
; `pio run -e <name>` builds just one (env names match the examples/ subfolder names).
;
; `lib_deps = symlink://.` makes this repo itself resolve as the PoweredUp library, so
; each example's `#include <PoweredUp.h>` finds PoweredUp.h right here at the repo root.
;
; PlatformIO can't set src_dir per-environment in one platformio.ini, so
; pio_copy_example.py (a pre-build script, see extra_scripts below) copies the matching
; examples/<env>/<env>.ino into build_src/main.cpp before each environment builds.
; build_src/ (not "src/") avoids colliding with this repo's own self-referencing
; `lib_deps = symlink://.` - see pio_copy_example.py's comment for why.

[platformio]
src_dir = build_src

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
; NimBLE-Arduino is declared explicitly here (not left to library.properties's
; `depends=` chain) - LDF doesn't reliably follow that transitive dependency when the
; library itself is self-referenced via symlink://. Unconstrained: the code here uses
; the 2.x callback API (NimBLEScanCallbacks, onScanEnd(...) etc.) - pinning to ^1.4.0
; resolves an incompatible 1.x release and fails to compile.
lib_deps =
    symlink://.
    h2zero/NimBLE-Arduino
build_flags =
    -DARDUINO_USB_MODE
    -DARDUINO_USB_CDC_ON_BOOT
extra_scripts = pre:pio_copy_example.py

[env:button_motor]

[env:sensor_motor]

[env:train_hub]

[env:train_remote]
lib_deps =
    ${env.lib_deps}
    adafruit/Adafruit NeoPixel@^1.12.3

[env:wifi_control]

[env:analog_throttle]
